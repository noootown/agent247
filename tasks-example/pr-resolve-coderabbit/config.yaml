# ── Task identity & scheduling ──
name: Resolve CodeRabbit Comments
schedule: "*/30 * * * *"
timeout: 600
enabled: true
model: sonnet

# ── Execution pipeline ──
# 1. Discovery
discovery:
  command: >-
    bash tasks/pr-resolve-coderabbit/discover.sh {{github_username}}
    {{platform_repo}} {{platform_repo_path}}
  item_key: thread_id

# 4. Claude execution
cwd: "{{worktree_path}}"

# 6. Run cleanup
cleanup:
  command: gh pr view {{pr_url}} --json state -q '.state'
  when: MERGED|CLOSED
  retain: 12h

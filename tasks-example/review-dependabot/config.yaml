name: Review Dependabot PRs
schedule: "*/30 * * * *"
timeout: 300
enabled: true
discovery:
  command: "gh pr list --author 'dependabot[bot]' --json url,number,title,headRefName"
  item_key: url
prompt_mode: per_item
lifecycle:
  auto_resolve: true
  resolve_command: "gh pr view {{url}} --json state -q '.state'"
  resolve_when: "MERGED|CLOSED"
